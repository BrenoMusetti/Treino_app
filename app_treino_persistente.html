// STORAGE
async function salvar(key, val){
  try{ await window.storage.set(key, JSON.stringify(val)); showSaved(); }catch(e){}
}
async function carregar(key, fallback){
  try{ const r=await window.storage.get(key); return r?JSON.parse(r.value):fallback; }catch(e){ return fallback; }
}
function showSaved(){
  const el=document.getElementById('save-indicator');
  el.style.display='flex';
  clearTimeout(window._saveTimer);
  window._saveTimer=setTimeout(()=>el.style.display='none',2000);
}

let mesAtivo=1,semAtiva=1,treinoAtivo=null,cargas={},historico=[];

async function init(){
  cargas = await carregar('cargas', {});
  historico = await carregar('historico', []);
  const nav = await carregar('nav', {mes:1,sem:1});
  mesAtivo = nav.mes; semAtiva = nav.sem;
  initMesTabs(); initSemTabs(); renderTreinos();
  const pct=Math.round(((mesAtivo-1)/3)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-text').textContent='Mês '+mesAtivo+' — '+PROGRAMA[mesAtivo].nome;
  document.querySelectorAll('.mtab')[mesAtivo-1].classList.add('active');
}

function toast(m){const t=document.getElementById('toaster');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2200)}

function initMesTabs(){
  const c=document.getElementById('mes-tabs');c.innerHTML='';
  Object.entries(PROGRAMA).forEach(([k,m])=>{
    const b=document.createElement('button');
    b.className='mtab'+(k==mesAtivo?' active':'');
    b.textContent='M'+k+' — '+m.nome;
    b.onclick=()=>setMes(parseInt(k),b);
    c.appendChild(b);
  });
}
function setMes(m,btn){
  mesAtivo=m;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const sems=Object.keys(PROGRAMA[m].semanas).map(Number);
  semAtiva=sems[0];
  salvar('nav',{mes:mesAtivo,sem:semAtiva});
  initSemTabs();renderTreinos();
  const pct=Math.round(((m-1)/3)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-text').textContent='Mês '+m+' — '+PROGRAMA[m].nome;
}
function initSemTabs(){
  const c=document.getElementById('sem-tabs');c.innerHTML='';
  Object.keys(PROGRAMA[mesAtivo].semanas).map(Number).forEach(s=>{
    const b=document.createElement('button');
    b.className='stab'+(s==semAtiva?' active':'');
    b.textContent='S'+s;
    b.onclick=()=>setSem(s,b);
    c.appendChild(b);
  });
}
function setSem(s,btn){
  semAtiva=s;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  salvar('nav',{mes:mesAtivo,sem:semAtiva});
  renderTreinos();
}

function ultimaCarga(exercicio){
  for(const h of historico){
    const ex=h.exs.find(e=>e.n===exercicio);
    if(ex && ex.c>0) return ex.c;
  }
  return null;
}

    const grupos=[...new Set(t.exs.map(e=>e.g.split('/')[0]))];
    const div=document.createElement('div');div.className='card';
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="t-title" style="margin-bottom:0">${t.nome}</div>
        <span class="badge ${badge}">${key}</span>
      </div>
      <div class="session-summary">
        <span class="sum-pill"><i class="ti ti-clock" style="font-size:13px" aria-hidden="true"></i> ~${t.tipo==='upper'?'71':'74'} min</span>
        <span class="sum-pill"><i class="ti ti-bike" style="font-size:13px" aria-hidden="true"></i> ${CARDIO[semAtiva].tempo}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;margin-bottom:10px">${grupos.map(g=>`<span class="tag">${g}</span>`).join('')}</div>
      <button class="btn-p" onclick="iniciar('${key}',event)"><i class="ti ti-player-play" style="font-size:13px" aria-hidden="true"></i> Iniciar sessão</button>`;
    list.appendChild(div);
  });
}

function iniciar(key,e){
  e.stopPropagation();
  treinoAtivo={key,mes:mesAtivo,sem:semAtiva};
  renderTreinar();
  document.querySelectorAll('.nb')[1].click();
}

function renderTreinar(){
  const c=document.getElementById('treinar-content');
  if(!treinoAtivo){
    c.innerHTML=`<div class="empty"><i class="ti ti-dumbbell" style="font-size:40px;color:var(--color-text-secondary)" aria-hidden="true"></i><p style="margin-top:12px">Selecione um treino na aba Treinos</p></div>`;
    return;
  }
  const t=PROGRAMA[treinoAtivo.mes].semanas[treinoAtivo.sem].treinos[treinoAtivo.key];
  const cor=PROGRAMA[treinoAtivo.mes].cor;
  const aq=AQUEC[t.tipo], al=ALONG[t.tipo], cd=CARDIO[treinoAtivo.sem];

  let html=`<div class="card" style="border-left:3px solid ${cor};border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0;margin-bottom:4px">
    <div class="t-title">${t.nome}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">Mês ${treinoAtivo.mes} · Semana ${treinoAtivo.sem}</div>
  </div>`;

  html+=`<div class="phase-header aquec"><i class="ti ti-flame" aria-hidden="true"></i> Aquecimento — 8 min</div>
  <div class="card" style="padding:10px 14px;margin-bottom:16px">`;
  aq.forEach(a=>{ html+=`<div class="phase-item"><div class="ex-name">${a.n}</div><div class="ex-dica">${a.d}</div></div>`; });
  html+=`</div>`;

  html+=`<div class="phase-header treino"><i class="ti ti-dumbbell" aria-hidden="true"></i> Treino principal</div>`;
  t.exs.forEach((ex,i)=>{
    const k=`m${treinoAtivo.mes}_s${treinoAtivo.sem}_${treinoAtivo.key}_${i}`;
    if(cargas[k]==null) cargas[k]=0;
    const isSuper=ex.r.includes('+');
    const ult=ultimaCarga(ex.n);
    const ultHtml=ult!=null?`<div class="ultima"><i class="ti ti-history" style="font-size:11px" aria-hidden="true"></i> Última vez: ${ult}kg</div>`:'';
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
        <div style="flex:1;margin-right:8px">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-meta">${ex.s} séries × ${ex.r}${isSuper?` <span class="super-tag">superset</span>`:''}</div>
          ${ultHtml}
        </div>
        <span class="tag" style="font-size:10px;white-space:nowrap">${ex.g.split('/')[0]}</span>
      </div>
      <div class="ex-dica">${ex.d}</div>
      <div class="carga-row">
        <span style="font-size:12px;color:var(--color-text-secondary)">Carga hoje (kg)</span>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="cbtn" onclick="mc('${k}',-2.5)">−</button>
          <span class="cval" id="cv-${k}">${cargas[k]}kg</span>
          <button class="cbtn" onclick="mc('${k}',2.5)">+</button>
        </div>
      </div>
    </div>`;
  });

  html+=`<div class="phase-header cardio" style="margin-top:4px"><i class="ti ti-bike" aria-hidden="true"></i> Cardio pós-treino — ${cd.tempo}</div>
  <div class="card" style="padding:12px 14px;margin-bottom:16px">
    <div class="ex-name" style="margin-bottom:4px">${cd.equip}</div>
    <div class="ex-dica">${cd.protocolo}</div>
  </div>`;

  html+=`<div class="phase-header along"><i class="ti ti-heart" aria-hidden="true"></i> Alongamento — 8 min</div>
  <div class="card" style="padding:10px 14px;margin-bottom:16px">`;
  al.forEach(a=>{ html+=`<div class="phase-item"><div class="ex-name">${a.n}</div><div class="ex-dica">${a.d}</div></div>`; });
  html+=`</div>`;

  html+=`<button class="btn-p" onclick="finalizar()"><i class="ti ti-check" style="font-size:13px" aria-hidden="true"></i> Finalizar sessão</button>`;
  c.innerHTML=html;
}

function mc(k,d){
  cargas[k]=Math.max(0,Math.round((cargas[k]+d)*10)/10);
  const el=document.getElementById('cv-'+k);
  if(el) el.textContent=cargas[k]+'kg';
  salvar('cargas', cargas);
}

function finalizar(){
  if(!treinoAtivo)return;
  const t=PROGRAMA[treinoAtivo.mes].semanas[treinoAtivo.sem].treinos[treinoAtivo.key];
  historico.unshift({
    data:new Date().toLocaleDateString('pt-BR'),
    hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    nome:t.nome, mes:treinoAtivo.mes, sem:treinoAtivo.sem,
    exs:t.exs.map((ex,i)=>({n:ex.n, c:cargas[`m${treinoAtivo.mes}_s${treinoAtivo.sem}_${treinoAtivo.key}_${i}`]||0}))
  });
  salvar('historico', historico);
  treinoAtivo=null;
  toast('Sessão salva! 💪');
  renderProgresso(); renderTreinar();
  setTimeout(()=>document.querySelectorAll('.nb')[2].click(),500);
}

function renderProgresso(){
  document.getElementById('st-total').textContent=historico.length;
  document.getElementById('st-mes').textContent='M'+mesAtivo;
  document.getElementById('st-sem').textContent='S'+semAtiva;
  document.getElementById('st-exs').textContent=historico.reduce((a,h)=>a+h.exs.length,0);
  const list=document.getElementById('hist-list');
  if(!historico.length){
    list.innerHTML=`<div class="empty"><i class="ti ti-history" style="font-size:36px;color:var(--color-text-secondary)" aria-hidden="true"></i><p style="margin-top:10px">Nenhum treino ainda</p></div>`;
    return;
  }
  list.innerHTML=historico.map(h=>`
    <div class="hist-item">
      <div class="hist-date">Mês ${h.mes} · Semana ${h.sem} · ${h.data} às ${h.hora}</div>
      <div class="hist-name">${h.nome}</div>
      <div class="hist-exs">${h.exs.map(e=>e.n+(e.c?` <strong>${e.c}kg</strong>`:'')).join(' · ')}</div>
    </div>`).join('');
}

function goScreen(name,btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+name).classList.add('active');
  const titles={treinos:'Programa 3 meses',treinar:'Treinar agora',prog:'Progresso'};
  document.getElementById('htitle').textContent=titles[name];
  if(name==='treinar') renderTreinar();
  if(name==='prog') renderProgresso();
}

init();
</script>
