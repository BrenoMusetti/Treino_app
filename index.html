<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<title>Programa 3 Meses</title>
<style>
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --pink:#993556;--pink-light:#FBEAF0;
  --blue-light:#E6F1FB;--blue-dark:#185FA5;
  --bg:#ffffff;--bg2:#F5F5F3;--border:#E5E5E3;--border2:#D0D0CC;
  --text:#1A1A18;--text2:#6B6B67;--text3:#9B9B97;
  --radius:14px;--radius-sm:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;max-width:430px;margin:0 auto;min-height:100vh}
.app{padding-bottom:76px}
.header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10}
.header-icon{font-size:22px}
.header h1{font-size:17px;font-weight:600;color:var(--text)}
.save-ind{margin-left:auto;font-size:11px;color:var(--text2);display:none;align-items:center;gap:4px}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--text2);font-family:var(--font);font-weight:500}
.nb.active{color:var(--green)}
.nb svg{width:24px;height:24px;stroke-width:1.8}
.screen{display:none;padding:16px}.screen.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.bg{background:var(--green-light);color:var(--green-dark)}
.ba{background:var(--amber-light);color:var(--amber-dark)}
.bp{background:var(--pink-light);color:var(--pink)}
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;margin:2px;background:var(--bg2);color:var(--text2);font-weight:500}
.mes-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.mes-tabs::-webkit-scrollbar{display:none}
.mtab{padding:8px 16px;border-radius:20px;border:1px solid var(--border2);font-size:13px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--text2);font-family:var(--font);font-weight:500}
.mtab.active{background:var(--green);color:#fff;border-color:var(--green)}
.sem-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.sem-tabs::-webkit-scrollbar{display:none}
.stab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--text2);font-family:var(--font)}
.stab.active{background:var(--bg2);color:var(--text);border-color:var(--border2);font-weight:600}
.prog-wrap{margin-bottom:16px}
.prog-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.prog-bar{height:6px;background:var(--bg2);border-radius:3px}
.prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.t-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.t-sub{font-size:12px;color:var(--text2)}
.btn-p{width:100%;padding:13px;border-radius:var(--radius-sm);background:var(--green);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;font-family:var(--font)}
.btn-p:active{opacity:.85}
.ex-name{font-size:14px;font-weight:600;color:var(--text)}
.ex-meta{font-size:12px;color:var(--text2);margin-top:3px}
.ex-dica{font-size:12px;color:var(--text2);font-style:italic;margin-top:4px;line-height:1.4}
.ultima{font-size:11px;color:var(--green);margin-top:3px;font-weight:500}
.carga-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.cbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--font);font-weight:300}
.cbtn:active{background:var(--border)}
.cval{font-size:16px;font-weight:700;min-width:60px;text-align:center;color:var(--text)}
.carga-label{font-size:12px;color:var(--text2);font-weight:500}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.stat-val{font-size:26px;font-weight:700;color:var(--text)}
.hist-item{padding:13px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:11px;color:var(--text3);font-weight:500}
.hist-name{font-size:14px;font-weight:600;color:var(--text);margin-top:3px}
.hist-exs{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.7}
.empty{text-align:center;padding:48px 0;color:var(--text2);font-size:14px}
.empty svg{width:44px;height:44px;stroke:var(--text3);margin-bottom:12px}
.toaster{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:99;white-space:nowrap;font-family:var(--font)}
.super-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--pink-light);color:var(--pink);font-weight:600;margin-left:4px}
.tip-box{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:14px;font-size:13px;color:var(--text2);border-left:3px solid var(--green);line-height:1.4}
.phase-hdr{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:13px;font-weight:600}
.phase-hdr svg{width:16px;height:16px;stroke-width:2}
.ph-aquec{background:var(--blue-light);color:var(--blue-dark)}
.ph-treino{background:var(--green-light);color:var(--green-dark)}
.ph-cardio{background:var(--amber-light);color:var(--amber-dark)}
.ph-along{background:var(--pink-light);color:var(--pink)}
.phase-item{padding:10px 0;border-bottom:1px solid var(--border)}
.phase-item:last-child{border-bottom:none}
.sum-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sum-pill{display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 11px;border-radius:20px;background:var(--bg2);color:var(--text2);font-weight:500}
.sum-pill svg{width:14px;height:14px;stroke-width:2}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <span class="header-icon">🏋️</span>
  <h1 id="htitle">Programa 3 meses</h1>
  <span class="save-ind" id="save-ind"><span class="save-dot"></span>salvo</span>
</div>

<div class="screen active" id="sc-treinos">
  <div class="mes-tabs" id="mes-tabs"></div>
  <div class="prog-wrap">
    <div class="prog-label"><span id="prog-text">Mês 1 — Adaptação</span><span id="prog-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="sem-tabs" id="sem-tabs"></div>
  <div id="treinos-list"></div>
</div>

<div class="screen" id="sc-treinar">
  <div id="treinar-content"></div>
</div>

<div class="screen" id="sc-prog">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Treinos feitos</div><div class="stat-val" id="st-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Mês atual</div><div class="stat-val" id="st-mes">M1</div></div>
    <div class="stat-card"><div class="stat-label">Semana atual</div><div class="stat-val" id="st-sem">S1</div></div>
    <div class="stat-card"><div class="stat-label">Exercícios feitos</div><div class="stat-val" id="st-exs">0</div></div>
  </div>
  <div id="hist-list"></div>
</div>

<nav class="nav">
  <button class="nb active" onclick="goScreen('treinos',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16"/></svg>Treinos
  </button>
  <button class="nb" onclick="goScreen('treinar',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5,3 19,12 5,21"/></svg>Treinar
  </button>
  <button class="nb" onclick="goScreen('prog',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>Progresso
  </button>
</nav>
</div>
<div class="toaster" id="toaster"></div>

let mA=1,sA=1,tAtivo=null,cargas={},hist=[];

function showSaved(){const e=document.getElementById('save-ind');e.style.display='flex';clearTimeout(window._st);window._st=setTimeout(()=>e.style.display='none',2000)}
function save(k,v){try{localStorage.setItem('treino_'+k,JSON.stringify(v));showSaved();}catch(e){}}
function load(k,fb){try{const v=localStorage.getItem('treino_'+k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function toast(m){const t=document.getElementById('toaster');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2200)}

function init(){
  cargas=load('cargas',{});hist=load('hist',[]);
  const nav=load('nav',{m:1,s:1});mA=nav.m;sA=nav.s;
  buildMes();buildSem();renderTreinos();
  const pct=Math.round(((mA-1)/3)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-text').textContent='Mês '+mA+' — '+P[mA].n;
}

function buildMes(){
  const c=document.getElementById('mes-tabs');c.innerHTML='';
  [1,2,3].forEach(k=>{
    const b=document.createElement('button');
    b.className='mtab'+(k==mA?' active':'');
    b.textContent='M'+k+' — '+P[k].n;
    b.onclick=()=>setMes(k,b);c.appendChild(b);
  });
}
function setMes(m,btn){
  mA=m;document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  sA=Object.keys(P[m].s).map(Number)[0];save('nav',{m:mA,s:sA});
  buildSem();renderTreinos();
  const pct=Math.round(((m-1)/3)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-text').textContent='Mês '+m+' — '+P[m].n;
}
function buildSem(){
  const c=document.getElementById('sem-tabs');c.innerHTML='';
  Object.keys(P[mA].s).map(Number).forEach(s=>{
    const b=document.createElement('button');
    b.className='stab'+(s==sA?' active':'');
    b.textContent='S'+s;b.onclick=()=>setSem(s,b);c.appendChild(b);
  });
}
function setSem(s,btn){
  sA=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  save('nav',{m:mA,s:sA});renderTreinos();
}

function ultimaCarga(nome){
  for(const h of hist){const e=h.exs.find(x=>x.n===nome);if(e&&e.c>0)return e.c;}return null;
}

function renderTreinos(){
  const list=document.getElementById('treinos-list');
  const sem=P[mA].s[sA];const cor=P[mA].c;const badge=P[mA].b;
  list.innerHTML=`<div class="tip-box">${sem.f}</div>`;
  Object.entries(sem.t).forEach(([key,t])=>{
    const grupos=[...new Set(t.e.map(e=>e.g.split('/')[0]))];
    const cd=CARDIO[sA];
    const div=document.createElement('div');div.className='card';
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="t-title" style="margin-bottom:0">${t.n}</div>
        <span class="badge ${badge}">${key}</span>
      </div>
      <div class="sum-pills">
        <span class="sum-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>~${t.tp==='upper'?71:74} min</span>
        <span class="sum-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>${cd.t}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;margin-bottom:12px">${grupos.map(g=>`<span class="tag">${g}</span>`).join('')}</div>
      <button class="btn-p" onclick="iniciar('${key}',event)">▶ Iniciar sessão</button>`;
    list.appendChild(div);
  });
}

function iniciar(key,e){
  e.stopPropagation();tAtivo={key,m:mA,s:sA};renderTreinar();
  document.querySelectorAll('.nb')[1].click();
}

function renderTreinar(){
  const c=document.getElementById('treinar-content');
  if(!tAtivo){
    c.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16"/></svg><p>Selecione um treino<br>na aba Treinos</p></div>`;return;
  }
  const t=P[tAtivo.m].s[tAtivo.s].t[tAtivo.key];
  const cor=P[tAtivo.m].c;
  const aq=AQUEC[t.tp],al=ALONG[t.tp],cd=CARDIO[tAtivo.s];

  let h=`<div class="card" style="border-left:3px solid ${cor};border-radius:0 14px 14px 0;margin-bottom:8px">
    <div class="t-title">${t.n}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:3px">Mês ${tAtivo.m} · Semana ${tAtivo.s}</div>
  </div>`;

  h+=`<div class="phase-hdr ph-aquec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>Aquecimento — 8 min</div>
  <div class="card" style="padding:10px 14px;margin-bottom:14px">`;
  aq.forEach(a=>{h+=`<div class="phase-item"><div class="ex-name">${a.n}</div><div class="ex-dica">${a.d}</div></div>`;});
  h+=`</div>`;

  h+=`<div class="phase-hdr ph-treino"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M4 12h16"/></svg>Treino principal</div>`;
  t.e.forEach((ex,i)=>{
    const k=`m${tAtivo.m}_s${tAtivo.s}_${tAtivo.key}_${i}`;
    if(cargas[k]==null)cargas[k]=0;
    const isS=ex.r.includes('+');
    const ult=ultimaCarga(ex.n);
    const ultH=ult!=null?`<div class="ultima">↑ Última vez: ${ult}kg</div>`:'';
    h+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="flex:1;margin-right:8px">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-meta">${ex.s} séries × ${ex.r}${isS?` <span class="super-tag">superset</span>`:''}</div>
          ${ultH}
        </div>
        <span class="tag" style="font-size:11px;white-space:nowrap">${ex.g.split('/')[0]}</span>
      </div>
      <div class="ex-dica">${ex.d}</div>
      <div class="carga-row">
        <span class="carga-label">Carga hoje (kg)</span>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="cbtn" onclick="mc('${k}',-2.5)">−</button>
          <span class="cval" id="cv-${k}">${cargas[k]}kg</span>
          <button class="cbtn" onclick="mc('${k}',2.5)">+</button>
        </div>
      </div>
    </div>`;
  });

  h+=`<div class="phase-hdr ph-cardio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><path d="M15 17.5H9M3.5 14.5L8 3h8l2.5 6.5"/></svg>Cardio pós-treino — ${cd.t}</div>
  <div class="card" style="padding:12px 14px;margin-bottom:14px">
    <div class="ex-name" style="margin-bottom:5px">${cd.e}</div>
    <div class="ex-dica">${cd.p}</div>
  </div>`;

  h+=`<div class="phase-hdr ph-along"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Alongamento — 8 min</div>
  <div class="card" style="padding:10px 14px;margin-bottom:14px">`;
  al.forEach(a=>{h+=`<div class="phase-item"><div class="ex-name">${a.n}</div><div class="ex-dica">${a.d}</div></div>`;});
  h+=`</div>`;

  h+=`<button class="btn-p" onclick="finalizar()">✓ Finalizar sessão</button>`;
  c.innerHTML=h;
}

function mc(k,d){
  cargas[k]=Math.max(0,Math.round((cargas[k]+d)*10)/10);
  const el=document.getElementById('cv-'+k);if(el)el.textContent=cargas[k]+'kg';
  save('cargas',cargas);
}

function finalizar(){
  if(!tAtivo)return;
  const t=P[tAtivo.m].s[tAtivo.s].t[tAtivo.key];
  hist.unshift({
    data:new Date().toLocaleDateString('pt-BR'),
    hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    n:t.n,m:tAtivo.m,s:tAtivo.s,
    exs:t.e.map((ex,i)=>({n:ex.n,c:cargas[`m${tAtivo.m}_s${tAtivo.s}_${tAtivo.key}_${i}`]||0}))
  });
  save('hist',hist);tAtivo=null;
  toast('Sessão salva! 💪');renderProg();renderTreinar();
  setTimeout(()=>document.querySelectorAll('.nb')[2].click(),500);
}

function renderProg(){
  document.getElementById('st-total').textContent=hist.length;
  document.getElementById('st-mes').textContent='M'+mA;
  document.getElementById('st-sem').textContent='S'+sA;
  document.getElementById('st-exs').textContent=hist.reduce((a,h)=>a+h.exs.length,0);
  const list=document.getElementById('hist-list');
  if(!hist.length){
    list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg><p>Nenhum treino ainda</p></div>`;return;
  }
  list.innerHTML=hist.map(h=>`
    <div class="hist-item">
      <div class="hist-date">Mês ${h.m} · Semana ${h.s} · ${h.data} às ${h.hora}</div>
      <div class="hist-name">${h.n}</div>
      <div class="hist-exs">${h.exs.map(e=>e.n+(e.c?` <strong>${e.c}kg</strong>`:'')).join(' · ')}</div>
    </div>`).join('');
}

function goScreen(name,btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+name).classList.add('active');
  const titles={treinos:'Programa 3 meses',treinar:'Treinar agora',prog:'Progresso'};
  document.getElementById('htitle').textContent=titles[name];
  if(name==='treinar')renderTreinar();if(name==='prog')renderProg();
}

init();
</script>
</body>
</html>
