<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nutrição">
<title>Plano Alimentar</title>
<style>
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --orange:#BA5A17;--orange-light:#FAEEDA;
  --red:#C0392B;--red-light:#FDECEA;
  --bg:#ffffff;--bg2:#F5F5F3;--border:#E5E5E3;--border2:#D0D0CC;
  --text:#1A1A18;--text2:#6B6B67;--text3:#9B9B97;
  --radius:14px;--radius-sm:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;max-width:430px;margin:0 auto;min-height:100vh}
.app{padding-bottom:76px}

/* HEADER */
.header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10}
.header-icon{font-size:22px}
.header h1{font-size:17px;font-weight:600;color:var(--text)}
.save-ind{margin-left:auto;font-size:11px;color:var(--text2);display:none;align-items:center;gap:4px}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--text2);font-family:var(--font);font-weight:500;touch-action:manipulation}
.nb.active{color:var(--green)}
.nb svg{width:24px;height:24px;stroke-width:1.8}

/* SCREENS */
.screen{display:none;padding:16px}.screen.active{display:block}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}

/* DAY CHIPS */
.day-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.dtab{padding:8px 16px;border-radius:20px;border:1px solid var(--border2);font-size:13px;cursor:pointer;white-space:nowrap;background:transparent;color:var(--text2);font-family:var(--font);font-weight:500;touch-action:manipulation}
.dtab.active{background:var(--green);color:#fff;border-color:var(--green)}

/* MACRO RING */
.ring-wrap{display:flex;align-items:center;gap:16px;padding:14px;background:var(--bg2);border-radius:var(--radius);margin-bottom:12px}
.ring-svg-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:#E5E5E3;stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke:#1D9E75;stroke-dasharray:226;stroke-dashoffset:226;transition:stroke-dashoffset .5s ease,stroke .3s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-kcal{font-size:20px;font-weight:700;color:var(--text)}
.ring-label{font-size:10px;color:var(--text2)}
.ring-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.mrow-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.mrow-name{color:var(--text2)}
.mrow-val{font-weight:600;color:var(--text)}
.mrow-val span{color:var(--text3);font-weight:400}
.bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:5px;border-radius:3px;transition:width .4s ease}
.bar-p{background:var(--green)}
.bar-c{background:#378ADD}
.bar-g{background:#E07820}
.ring-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:10px 14px 2px}
.ring-footer strong{color:var(--text)}

/* MEAL CARDS */
.meal-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.meal-card.done{border-color:var(--green)}
.meal-card.done .meal-head{background:var(--green-light)}
.meal-card.accent-blue{border-left:3px solid #378ADD}
.meal-card.accent-green{border-left:3px solid var(--green)}

.meal-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;transition:all .2s;cursor:pointer;touch-action:manipulation}
.meal-card.done .check-circle{background:var(--green);border-color:var(--green);color:#fff}
.meal-icon{font-size:20px;width:26px;text-align:center}
.meal-info{flex:1;min-width:0}
.meal-title{font-size:14px;font-weight:600;color:var(--text)}
.meal-time{font-size:11px;color:var(--text3);margin-top:1px}
.meal-kcal-badge{font-size:12px;font-weight:700;color:var(--green);background:var(--green-light);padding:3px 9px;border-radius:99px;white-space:nowrap}
.meal-card.done .meal-kcal-badge{background:rgba(29,158,117,0.2)}
.expand-arr{font-size:10px;color:var(--text3);transition:transform .2s;margin-left:2px}
.meal-card.open .expand-arr{transform:rotate(180deg)}

.meal-body{display:none;border-top:1px solid var(--border)}
.meal-card.open .meal-body{display:block}

/* FOOD LIST */
.food-list{padding:10px 14px}
.food-item{padding:7px 0;border-bottom:1px solid var(--border)}
.food-item:last-child{border-bottom:none}
.food-main{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.food-name{font-size:13px;font-weight:500;color:var(--text)}
.food-qty{font-size:12px;font-weight:600;color:var(--blue);white-space:nowrap}
.food-alts{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.alt-chip{font-size:10px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:2px 7px;color:var(--text2)}

/* MEAL MACROS */
.meal-macros{display:flex;padding:10px 14px;border-top:1px solid var(--border)}
.mm{flex:1;text-align:center}
.mm-val{font-size:14px;font-weight:700}
.mm-lbl{font-size:9px;color:var(--text3);margin-top:1px}
.mm.p .mm-val{color:var(--green)}
.mm.c .mm-val{color:#378ADD}
.mm.g .mm-val{color:#E07820}
.mm.k .mm-val{color:var(--text2)}

/* RECEITA BTN */
.receita-row{padding:0 14px 12px}
.btn-receita{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font);touch-action:manipulation;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-receita:active{background:var(--border)}

/* REFEIÇÃO LIVRE */
.livre-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius);margin-bottom:10px}
.livre-icon{font-size:24px;flex-shrink:0}
.livre-info{flex:1}
.livre-title{font-size:14px;font-weight:600;color:var(--text)}
.livre-sub{font-size:11px;color:var(--text2);margin-top:2px}
.livre-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:var(--font);touch-action:manipulation;white-space:nowrap}
.livre-card.usada{background:var(--green-light);border-color:rgba(29,158,117,.3);border-style:solid}
.livre-card.usada .livre-title{color:var(--green-dark)}
.livre-card.usada .livre-btn{background:var(--green);color:#fff;border-color:var(--green)}

/* RESET BTN */
.btn-reset{width:100%;padding:11px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--font);margin-top:4px;touch-action:manipulation}
.btn-reset:active{background:var(--bg2)}

/* HISTÓRICO */
.hist-item{padding:13px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:11px;color:var(--text3);font-weight:500}
.hist-day{font-size:14px;font-weight:600;color:var(--text);margin-top:3px}
.hist-kcal{font-size:13px;color:var(--green);font-weight:600;margin-top:2px}
.hist-bars{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.hb-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.hb-bg{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.hb-fill{height:4px;border-radius:2px}
.hb-val{width:32px;text-align:right;color:var(--text2)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.stat-val{font-size:26px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.empty{text-align:center;padding:40px 0;color:var(--text2);font-size:14px;line-height:1.7}

/* MODAL RECEITA */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,16px);animation:sup .22s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px 10px}
.modal-title{font-size:17px;font-weight:700;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-family:var(--font);touch-action:manipulation;flex-shrink:0;margin-left:12px}
.modal-desc{font-size:13px;color:var(--text2);padding:0 20px 12px;line-height:1.5}
.modal-sec{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:12px 20px 8px;border-top:1px solid var(--border)}
.modal-sec:first-of-type{border-top:none}
.ingr-list{list-style:none}
.ingr-item{display:flex;justify-content:space-between;padding:9px 20px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.ingr-item:last-child{border-bottom:none}
.ingr-qty{color:var(--blue);font-weight:600}
.step-list{list-style:none}
.step-item{display:flex;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border)}
.step-item:last-child{border-bottom:none}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--green-light);border:1px solid rgba(29,158,117,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green-dark);flex-shrink:0}
.step-text{font-size:13px;color:var(--text2);line-height:1.55}
.modal-note{margin:12px 20px 4px;background:var(--bg2);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:10px 13px;font-size:12px;color:var(--text2);line-height:1.6}

/* TOAST */
.toaster{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:99;white-space:nowrap;font-family:var(--font)}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <span class="header-icon">🥗</span>
  <h1 id="htitle">Plano Alimentar</h1>
  <span class="save-ind" id="save-ind"><span class="save-dot"></span>salvo</span>
</div>

<!-- SCREEN: HOJE -->
<div class="screen active" id="sc-hoje">
  <div class="day-tabs" id="day-tabs"></div>
  <div class="ring-wrap">
    <div class="ring-svg-wrap">
      <svg class="ring-svg" width="88" height="88" viewBox="0 0 88 88">
        <circle class="ring-track" cx="44" cy="44" r="36"/>
        <circle class="ring-fill" id="ring-fill" cx="44" cy="44" r="36"/>
      </svg>
      <div class="ring-center">
        <div class="ring-kcal" id="kcal-num">0</div>
        <div class="ring-label">kcal</div>
      </div>
    </div>
    <div class="ring-stats">
      <div>
        <div class="mrow-head"><span class="mrow-name">🟢 Proteína</span><span class="mrow-val" id="p-val">0g <span id="p-goal"></span></span></div>
        <div class="bar-bg"><div class="bar-fill bar-p" id="bar-p" style="width:0%"></div></div>
      </div>
      <div>
        <div class="mrow-head"><span class="mrow-name">🔵 Carboidratos</span><span class="mrow-val" id="c-val">0g <span id="c-goal"></span></span></div>
        <div class="bar-bg"><div class="bar-fill bar-c" id="bar-c" style="width:0%"></div></div>
      </div>
      <div>
        <div class="mrow-head"><span class="mrow-name">🟠 Gordura</span><span class="mrow-val" id="g-val">0g <span id="g-goal"></span></span></div>
        <div class="bar-bg"><div class="bar-fill bar-g" id="bar-g" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="ring-footer">
    <span>Meta: <strong id="kcal-goal">2.650</strong> kcal</span>
    <span>Restam: <strong id="kcal-left">2.650</strong> kcal</span>
  </div>
  <div style="height:12px"></div>
  <div id="meals-list"></div>
  <div class="livre-card" id="livre-card">
    <div class="livre-icon">🎉</div>
    <div class="livre-info">
      <div class="livre-title">Refeição livre da semana</div>
      <div class="livre-sub">1x por semana — sem culpa, sem contar macro</div>
    </div>
    <button class="livre-btn" id="livre-btn">Usar</button>
  </div>
  <button class="btn-reset" id="btn-reset">↺ Reiniciar dia</button>
</div>

<!-- SCREEN: HISTÓRICO -->
<div class="screen" id="sc-hist">
  <div class="stat-grid" id="stat-grid"></div>
  <div id="hist-list"></div>
</div>

<nav class="nav">
  <button class="nb active" id="nb-hoje">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    Hoje
  </button>
  <button class="nb" id="nb-hist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
    Histórico
  </button>
</nav>

</div><!-- /app -->
<div class="toaster" id="toaster"></div>

<!-- MODAL RECEITA -->
<div class="modal-bg" id="modal-bg">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-sec">Ingredientes</div>
    <ul class="ingr-list" id="modal-ingr"></ul>
    <div class="modal-sec">Modo de preparo</div>
    <ul class="step-list" id="modal-steps"></ul>
    <div class="modal-note" id="modal-note"></div>
    <div style="height:20px"></div>
  </div>
</div>

<script>
/* ─── DADOS ─────────────────────────────── */
const GOALS={
  treino:  {kcal:2300,p:185,c:240,g:65},
  tenis:   {kcal:2300,p:185,c:255,g:60},
  descanso:{kcal:2000,p:175,c:175,g:62}
};

const RECEITAS={
  bolinho:{
    title:'Bolinho de Whey',
    desc:'Receita rápida de microondas — proteína alta, sem açúcar. Perfeito antes ou depois do treino.',
    ingr:[
      {n:'Whey protein (chocolate ou baunilha)',q:'30g'},
      {n:'Aveia em flocos finos',q:'12g'},

  creme:{
    title:'Creme de Whey com Frutas',
    desc:'Textura de mousse leve — pronto em 2 min, sem fogo. Ótimo no pós-treino ou como sobremesa proteica.',
    ingr:[
      {n:'Whey protein (qualquer sabor)',q:'30g'},
      {n:'Água gelada (adicionar aos poucos)',q:'40–60ml'},
      {n:'Fruta picada (morango, banana, manga)',q:'150g'},
    ],
    steps:[
      'Coloque o whey num bowl. Adicione água aos poucos mexendo com garfo.',
      'Pare quando atingir textura de creme espesso (tipo mousse).',
      'Adicione a fruta picada. Opcional: 1 col. sopa de iogurte grego para mais proteína.',
    ],
    note:'Macros (com morango): ~27g prot · 18g carbs · 2g gord · ~200 kcal\nCombinações: baunilha+banana+canela; chocolate+morango; morango+mirtilo+limão.',
  }
};

const MEALS={
  /* ── DIA DE TREINO — 2.300 kcal ── */
  treino:[
    {id:'m1',icon:'☀️',title:'Café da manhã',time:'07h00',kcal:480,p:35,c:50,g:14,
     foods:[
       {n:'Ovos inteiros',q:'3 unid.',alts:['4 claras + 1 gema','omelete com cottage','ovo mexido com atum']},

       {n:'Banana',q:'1 pequena',alts:['maçã','mamão 150g','frutas vermelhas 100g']},

     ]},
    {id:'m2',icon:'🍽️',title:'Almoço',time:'12h30',kcal:650,p:50,c:70,g:16,
     foods:[
       {n:'Frango grelhado',q:'180g',alts:['patinho moído 160g','tilápia 200g','carne magra 160g']},
       {n:'Arroz branco',q:'100g coz.',alts:['arroz integral 90g','batata doce 150g','batata inglesa 180g','macarrão integral 80g']},
       {n:'Feijão carioca',q:'70g coz.',alts:['lentilha 70g','grão-de-bico 70g','feijão preto 70g']},
       {n:'Legumes refogados',q:'200g',alts:['brócolis + cenoura','abobrinha + berinjela','couve-flor no vapor']},
       {n:'Azeite de oliva',q:'1 col. chá',alts:['abacate ¼ unid.']},
     ]},
    {id:'m3',icon:'🍎',title:'Lanche da tarde',time:'16h00',kcal:200,p:20,c:18,g:6,
     foods:[
       {n:'Iogurte grego natural',q:'150g',alts:['cottage 150g','kefir 200ml']},
       {n:'Frutas vermelhas',q:'80g',alts:['maçã ½ unid.','kiwi 1 unid.','pera ½']},
     ]},
    {id:'m4',icon:'⚡',title:'Pré-treino',time:'18h30',kcal:480,p:42,c:55,g:10,accent:'blue',
     receita:'bolinho',receitaLabel:'🍫 Receita: Bolinho de Whey',
     foods:[
       {n:'Arroz branco',q:'100g coz.',alts:['batata doce 130g','macarrão integral 80g','mandioca 110g']},
       {n:'Frango grelhado',q:'150g',alts:['atum em água 150g','ovos mexidos 3 unid.']},
       {n:'Creatina',q:'5g',alts:['pode ser no pós-treino']},
     ]},
    {id:'m5',icon:'🌙',title:'Jantar / pós-treino',time:'21h00',kcal:490,p:50,c:42,g:14,accent:'green',
     receita:'creme',receitaLabel:'🍓 Receita: Creme de Whey',
     foods:[
       {n:'Whey protein',q:'30g',alts:['frango 160g','queijo cottage 200g','4 claras + 1 ovo']},

/* ─── STATE ─────────────────────────────── */
let dayType='treino',checked={},hist=[];

function showSaved(){const e=document.getElementById('save-ind');e.style.display='flex';clearTimeout(window._st);window._st=setTimeout(()=>e.style.display='none',2000)}
function save(k,v){try{localStorage.setItem('nutri_'+k,JSON.stringify(v));showSaved();}catch(e){}}
function load(k,fb){try{const v=localStorage.getItem('nutri_'+k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function toast(m){const t=document.getElementById('toaster');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2200)}
function todayStr(){return new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}

/* ─── RENDER ─────────────────────────────── */
function updateMacros(){
  const meals=MEALS[dayType],goals=GOALS[dayType];
  const done=meals.filter(m=>checked[m.id]);
  const totK=done.reduce((a,m)=>a+m.kcal,0);
  const totP=done.reduce((a,m)=>a+m.p,0);
  const totC=done.reduce((a,m)=>a+m.c,0);
  const totG=done.reduce((a,m)=>a+m.g,0);

  const circ=2*Math.PI*36;
  const pct=Math.min(totK/goals.kcal,1);
  const fill=document.getElementById('ring-fill');
  fill.style.strokeDasharray=circ.toFixed(1);
  fill.style.strokeDashoffset=(circ-pct*circ).toFixed(1);
  fill.style.stroke=pct>=1?'#C0392B':pct>=0.85?'#E07820':'#1D9E75';

  document.getElementById('kcal-num').textContent=totK;
  document.getElementById('kcal-goal').textContent=goals.kcal.toLocaleString('pt-BR');
  document.getElementById('kcal-left').textContent=Math.max(0,goals.kcal-totK).toLocaleString('pt-BR');
  document.getElementById('p-val').innerHTML=totP+'g <span>/ '+goals.p+'g</span>';
  document.getElementById('c-val').innerHTML=totC+'g <span>/ '+goals.c+'g</span>';
  document.getElementById('g-val').innerHTML=totG+'g <span>/ '+goals.g+'g</span>';
  document.getElementById('bar-p').style.width=Math.min(100,totP/goals.p*100)+'%';
  document.getElementById('bar-c').style.width=Math.min(100,totC/goals.c*100)+'%';
  document.getElementById('bar-g').style.width=Math.min(100,totG/goals.g*100)+'%';
}

function renderMeals(){
  const list=document.getElementById('meals-list');
  list.innerHTML='';
  MEALS[dayType].forEach(meal=>{
    const isDone=!!checked[meal.id];

    const foodsHtml=meal.foods.map(f=>{
      const alts=(f.alts||[]).map(a=>`<span class="alt-chip">${a}</span>`).join('');
      return `<div class="food-item">
        <div class="food-main"><span class="food-name">${f.n}</span><span class="food-qty">${f.q}</span></div>
        ${alts?`<div class="food-alts">${alts}</div>`:''}
      </div>`;
    }).join('');

    const recHtml=meal.receita?`<div class="receita-row"><button class="btn-receita" id="rec-${meal.id}">📖 ${meal.receitaLabel||'Ver receita'}</button></div>`:'';

    const card=document.createElement('div');
    card.className='meal-card'+(meal.accent?' accent-'+meal.accent:'')+(isDone?' done':'');
    card.id='card-'+meal.id;
    card.innerHTML=`
      <div class="meal-head" id="head-${meal.id}">
        <div class="check-circle" id="chk-${meal.id}">${isDone?'✓':''}</div>
        <div class="meal-icon">${meal.icon}</div>
        <div class="meal-info">
          <div class="meal-title">${meal.title}</div>
          <div class="meal-time">${meal.time}</div>
        </div>
        <div class="meal-kcal-badge">${meal.kcal} kcal</div>
        <div class="expand-arr">▼</div>
      </div>
      <div class="meal-body" id="body-${meal.id}">
        <div class="food-list">${foodsHtml}</div>
        <div class="meal-macros">
          <div class="mm p"><div class="mm-val">${meal.p}g</div><div class="mm-lbl">Proteína</div></div>
          <div class="mm c"><div class="mm-val">${meal.c}g</div><div class="mm-lbl">Carbs</div></div>
          <div class="mm g"><div class="mm-val">${meal.g}g</div><div class="mm-lbl">Gordura</div></div>
          <div class="mm k"><div class="mm-val">${meal.kcal}</div><div class="mm-lbl">kcal</div></div>
        </div>
        ${recHtml}
      </div>`;
    list.appendChild(card);

    /* eventos — atribuídos em JS direto no elemento, igual ao app de treinos */
    document.getElementById('chk-'+meal.id).onclick=e=>{
      e.stopPropagation();
      checked[meal.id]=!checked[meal.id];
      save('checked_'+todayStr(),checked);
      saveHist();
      updateMacros();
      /* atualiza só este card, sem re-render completo */
      const c=document.getElementById('card-'+meal.id);
      const chk=document.getElementById('chk-'+meal.id);
      if(checked[meal.id]){c.classList.add('done');chk.textContent='✓';}
      else{c.classList.remove('done');chk.textContent='';}
      toast(checked[meal.id]?meal.title+' marcado ✓':'Desmarcado');
    };

    document.getElementById('head-'+meal.id).onclick=()=>{
      document.getElementById('card-'+meal.id).classList.toggle('open');
    };

    if(meal.receita){
      document.getElementById('rec-'+meal.id).onclick=e=>{
        e.stopPropagation();
        openReceita(meal.receita);
      };
    }
  });
}

function render(){
  updateMacros();
  renderMeals();
}

/* ─── HISTÓRICO ─────────────────────────── */
function saveHist(){
  const meals=MEALS[dayType],goals=GOALS[dayType];
  const done=meals.filter(m=>checked[m.id]);
  const entry={
    date:todayStr(),dayType,
    kcal:done.reduce((a,m)=>a+m.kcal,0),
    p:done.reduce((a,m)=>a+m.p,0),
    c:done.reduce((a,m)=>a+m.c,0),
    g:done.reduce((a,m)=>a+m.g,0),
    total:meals.length,done:done.length,
    goal:goals,
  };
  const idx=hist.findIndex(h=>h.date===entry.date);
  if(idx>=0)hist[idx]=entry;else hist.unshift(entry);
  if(hist.length>30)hist.length=30;
  save('hist',hist);
}

function renderHist(){
  const labels={treino:'🏋️ Treino',tenis:'🎾 Tênis',descanso:'😴 Descanso'};
  /* stats */
  const totalDias=hist.length;
  const mediaKcal=hist.length?Math.round(hist.reduce((a,h)=>a+h.kcal,0)/hist.length):0;
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Dias registrados</div><div class="stat-val">${totalDias}</div></div>
    <div class="stat-card"><div class="stat-label">Média kcal/dia</div><div class="stat-val">${mediaKcal}<span style="font-size:14px;color:var(--text2)"> kcal</span></div></div>`;
  /* lista */
  const el=document.getElementById('hist-list');
  if(!hist.length){el.innerHTML='<div class="empty">Nenhum dia registrado ainda.<br>Marque suas refeições de hoje para começar.</div>';return;}
  el.innerHTML=hist.map(h=>{
    const pPct=Math.min(100,h.p/h.goal.p*100).toFixed(0);
    const cPct=Math.min(100,h.c/h.goal.c*100).toFixed(0);
    const gPct=Math.min(100,h.g/h.goal.g*100).toFixed(0);
    return `<div class="hist-item">
      <div class="hist-date">${h.date} · ${labels[h.dayType]||h.dayType}</div>
      <div class="hist-day">${h.done}/${h.total} refeições</div>
      <div class="hist-kcal">${h.kcal} kcal <span style="color:var(--text3);font-weight:400">/ ${h.goal.kcal}</span></div>
      <div class="hist-bars">
        <div class="hb-row"><span>🟢P</span><div class="hb-bg"><div class="hb-fill bar-p" style="width:${pPct}%"></div></div><span class="hb-val">${h.p}g</span></div>
        <div class="hb-row"><span>🔵C</span><div class="hb-bg"><div class="hb-fill bar-c" style="width:${cPct}%"></div></div><span class="hb-val">${h.c}g</span></div>
        <div class="hb-row"><span>🟠G</span><div class="hb-bg"><div class="hb-fill bar-g" style="width:${gPct}%"></div></div><span class="hb-val">${h.g}g</span></div>
      </div>
    </div>`;
  }).join('');
}

/* ─── RECEITA MODAL ─────────────────────── */
function openReceita(key){
  const r=RECEITAS[key];if(!r)return;
  document.getElementById('modal-title').textContent=r.title;
  document.getElementById('modal-desc').textContent=r.desc;
  document.getElementById('modal-ingr').innerHTML=r.ingr.map(i=>`<li class="ingr-item"><span>${i.n}</span><span class="ingr-qty">${i.q}</span></li>`).join('');
  document.getElementById('modal-steps').innerHTML=r.steps.map((s,i)=>`<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('');
  document.getElementById('modal-note').innerHTML=r.note.replace(/\n/g,'<br>');
  document.getElementById('modal-bg').classList.add('open');
}

/* ─── NAV ───────────────────────────────── */
function goScreen(name,btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+name).classList.add('active');
  if(name==='hist')renderHist();
}

/* ─── INIT ───────────────────────────────── */
function init(){
  hist=load('hist',[]);
  const saved=load('day',{type:'treino',date:''});
  /* se mudou o dia, reseta o check */
  if(saved.date===todayStr()){
    dayType=saved.type;
    checked=load('checked_'+todayStr(),{});
  } else {
    dayType=saved.type||'treino';
    checked={};
  }

  /* day tabs */
  const tabs=document.getElementById('day-tabs');
  const dayLabels={treino:'🏋️ Treino',tenis:'🎾 Tênis',descanso:'😴 Descanso'};
  Object.keys(dayLabels).forEach(key=>{
    const b=document.createElement('button');
    b.className='dtab'+(key===dayType?' active':'');
    b.textContent=dayLabels[key];
    b.onclick=()=>{
      dayType=key;
      checked={};
      save('day',{type:dayType,date:todayStr()});
      save('checked_'+todayStr(),checked);
      document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
      b.classList.add('active');
      render();
    };
    tabs.appendChild(b);
  });

  /* nav */
  document.getElementById('nb-hoje').onclick=function(){goScreen('hoje',this)};
  document.getElementById('nb-hist').onclick=function(){goScreen('hist',this)};

  /* reset */
  document.getElementById('btn-reset').onclick=()=>{
    checked={};
    save('checked_'+todayStr(),checked);
    saveHist();
    render();
    toast('Dia reiniciado');
  };

  /* refeição livre */
  let livreUsada=load('livre_semana','');
  function semanaStr(){const d=new Date();const jan=new Date(d.getFullYear(),0,1);return d.getFullYear()+'W'+Math.ceil(((d-jan)/86400000+jan.getDay()+1)/7);}
  function updateLivre(){
    const card=document.getElementById('livre-card');
    const btn=document.getElementById('livre-btn');
    const usada=livreUsada===semanaStr();
    card.classList.toggle('usada',usada);
    btn.textContent=usada?'✓ Usada':'Usar';
    const sub=card.querySelector('.livre-sub');
    sub.textContent=usada?'Aproveitada essa semana — próxima em breve!':'1x por semana — sem culpa, sem contar macro';
  }
  document.getElementById('livre-btn').onclick=()=>{
    if(livreUsada===semanaStr()){
      livreUsada='';save('livre_semana','');
    } else {
      livreUsada=semanaStr();save('livre_semana',livreUsada);
      toast('🎉 Refeição livre aproveitada!');
    }
    updateLivre();
  };
  updateLivre();
  document.getElementById('modal-close').onclick=()=>document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal-bg').onclick=e=>{if(e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');};

  render();
}

init();
</script>
